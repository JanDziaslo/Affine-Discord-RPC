services:
  affine-discord-rpc:
    image: ghcr.io/jandziaslo/affine-discord-rpc:latest
    pid: host
    user: "${UID:-1000}:${GID:-1000}"
    container_name: affine-rpc
    volumes:
      # Mount all user runtime dirs; Discord socket appears under /run/user/<uid>/discord-ipc-*
      - /run/user:/run/user

      # Mount host homes so the app can find AFFiNE global-state.json reliably
      # even when HOME is not exported by the autostart environment.
      - /home:/host-home:ro

      # User configuration — must be filled in before first run
      - ./config.yaml:/app/config.yaml:ro

    environment:
      # Point pypresence at the user's runtime directory from .env (UID).
      XDG_RUNTIME_DIR: /run/user/${UID:-1000}

      PYTHONUNBUFFERED: "1"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import psutil; [p for p in psutil.process_iter() if 'affine_rpc' in ' '.join(p.cmdline())]"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
