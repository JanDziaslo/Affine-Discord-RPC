services:
  affine-discord-rpc:
    image: ghcr.io/dziaslo/affine-discord-rpc:latest
    pid: host

    volumes:
      # Discord IPC socket — where pypresence connects to Discord
      - ${XDG_RUNTIME_DIR:-/run/user/1000}:${XDG_RUNTIME_DIR:-/run/user/1000}

      # AFFiNE state files — document title is read from global-state.json
      # Mounted read-only; path is identical inside and outside the container
      # (Python reads Path.home() which is set via the HOME env var below).
      - ${HOME}/.config/AFFiNE:${HOME}/.config/AFFiNE:ro

      # User configuration — must be filled in before first run
      - ./config.yaml:/app/config.yaml:ro

    environment:
      # Make Path.home() inside Python resolve to the same path as on the host.
      # This ensures global-state.json is found at the correct mounted path.
      HOME: ${HOME}

      # Point pypresence at the correct Discord IPC socket directory.
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-/run/user/1000}

      PYTHONUNBUFFERED: "1"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import psutil; [p for p in psutil.process_iter() if 'affine_rpc' in ' '.join(p.cmdline())]"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
